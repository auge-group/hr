*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--bg2:#f5f5f4;--bg3:#efefed;--bgd:#fcebeb;--bgw:#faeeda;--bgi:#e6f1fb;--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--txd:#a32d2d;--txw:#854f0b;--txi:#185fa5;--bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);--r:8px;--rl:12px;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--bgd:#2a1414;--bgw:#261a08;--bgi:#0d1e30;--tx:#f0ede8;--tx2:#b4b2a9;--tx3:#888780;--txd:#f09595;--txw:#fac775;--txi:#85b7eb;--bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18)}}
body{font-family:var(--f);color:var(--tx);background:var(--bg3);min-height:100vh;padding:1rem 1.5rem}
.app{max-width:1300px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:0.5px solid var(--bd)}
h1{font-size:15px;font-weight:500}
.upd{font-size:11px;color:var(--tx3)}
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--bd);margin-bottom:1rem}
.tab{padding:6px 14px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--tx);border-bottom:2px solid var(--tx);font-weight:500}
.mets{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.met{background:var(--bg2);border-radius:var(--r);padding:.75rem}
.ml{font-size:10px;color:var(--tx2);margin-bottom:3px}
.mv{font-size:18px;font-weight:500}
.ms{font-size:10px;color:var(--tx3);margin-top:1px}
.als{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
.al{padding:6px 10px;border-radius:var(--r);font-size:11px}
.al-r{background:var(--bgd);color:var(--txd);border:0.5px solid rgba(163,45,45,.3)}
.al-a{background:var(--bgw);color:var(--txw);border:0.5px solid rgba(133,79,11,.3)}
.al-i{background:var(--bgi);color:var(--txi);border:0.5px solid rgba(24,95,165,.3)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;background:var(--bg);border-radius:var(--rl);overflow:hidden}
th{text-align:left;padding:6px 8px;border-bottom:0.5px solid var(--bd);color:var(--tx2);font-weight:500;white-space:nowrap;background:var(--bg2)}
th.r,td.r{text-align:right}
td{padding:5px 8px;border-bottom:0.5px solid var(--bd);white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.ex td{opacity:.42}
tr:hover td{background:var(--bg2)}
.badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:500}
.bd{background:#E6F1FB;color:#0C447C}.ba{background:#EAF3DE;color:#27500A}.bc{background:#EEEDFE;color:#3C3489}.bs{background:#FAEEDA;color:#633806}.bf{background:#E1F5EE;color:#085041}.be{background:#F1EFE8;color:#5F5E5A}
.flag{display:inline-block;padding:1px 4px;border-radius:3px;font-size:9px;background:var(--bgw);color:var(--txw);margin-left:3px}
.soc{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:500}
.ss{background:#EEEDFE;color:#3C3489}.sd{background:#E6F1FB;color:#0C447C}.sc{background:#FAEEDA;color:#633806}.se{background:#EAF3DE;color:#085041}
.scr{color:#A32D2D;font-weight:500}.sca{color:#854F0B;font-weight:500}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:6px}
.st{font-size:13px;font-weight:500}
.fls{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem}
.fb{padding:3px 10px;font-size:10px;border:0.5px solid var(--bd2);border-radius:20px;background:none;cursor:pointer;color:var(--tx2)}
.fb.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.btn{padding:5px 12px;font-size:11px;border:0.5px solid var(--bd2);border-radius:var(--r);background:none;cursor:pointer;color:var(--tx)}
.btn:hover{background:var(--bg2)}
.bts{padding:2px 7px;font-size:10px}
.btp{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.tot td{font-weight:500;background:var(--bg2);border-top:0.5px solid var(--bd2)}
.gh{font-size:11px;font-weight:500;color:var(--tx2);margin:1.25rem 0 .4rem;padding-bottom:3px;border-bottom:0.5px solid var(--bd)}
.cc{background:rgba(0,0,0,.02)}
.dv{border-left:0.5px solid var(--bd)}
input[type=search]{width:100%;padding:6px 9px;font-size:11px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);margin-bottom:.75rem}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.mod{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.mtit{font-size:14px;font-weight:500;margin-bottom:1rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:10px;color:var(--tx2)}
.ff input,.ff select{font-size:11px;padding:5px 7px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx)}
.fw{grid-column:1/-1}
.fs{grid-column:1/-1;margin:8px 0 2px;font-size:10px;font-weight:500;color:var(--tx2);border-top:0.5px solid var(--bd);padding-top:8px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:.75rem;border-top:0.5px solid var(--bd)}
.mt{text-align:center;padding:2.5rem;color:var(--tx2);font-size:12px}
</style>
</head>
